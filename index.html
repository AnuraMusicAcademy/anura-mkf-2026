let students = [];
let nextId = 22;
let currentView = 'parent'; // 'parent' or 'admin'

// ── Firebase sync ──
const dbRef = ref(db, 'mkf2026');

function saveToFirebase() {
  set(dbRef, { students, nextId, updatedAt: Date.now() });
}

function upd(id, field, val) {
  const s = students.find(x => x.id === id);
  if (s) {
    s[field] = val;
    saveToFirebase();
  }
}

// Listen for realtime changes
onValue(dbRef, (snapshot) => {
  const data = snapshot.val();
  if (data && data.students) {
    students = data.students;
    nextId = data.nextId || 22;
  } else {
    // First time — seed data
    students = SEED.map(s => ({...s}));
    saveToFirebase();
  }
  renderCurrentView();
});

// ── Helpers ──
function finalTotal(s) {
  if (s.r2Score == null) return null;
  let t = s.r1 + s.r2Score;
  if (s.r3Score != null) t += s.r3Score;
  return parseFloat(t.toFixed(2));
}
function catRanks(cat) {
  const sl = students.filter(s => s.category === cat && finalTotal(s) != null)
    .sort((a,b) => finalTotal(b) - finalTotal(a));
  const m = {}; sl.forEach((s,i) => m[s.id] = i+1); return m;
}
function sc(v) { return v != null ? v.toFixed(1) : '<span style="color:#aaa">—</span>'; }
function rowCls(s) {
  if (s.qualifiedR3 && s.isAnura) return 'ar qr';
  if (s.qualifiedR3) return 'qr';
  if (s.isAnura) return 'ar';
  return '';
}
function rkB(n) {
  if (!n) return '—';
  const c = n===1?'rk1':n===2?'rk2':n===3?'rk3':'rkn';
  return `<span class="rk ${c}">${n}</span>`;
}

function renderCurrentView() {
  if (currentView === 'admin') renderAdmin();
  else renderParent();
}

// ══════════════════════════════════════════
// PARENT VIEW
// ══════════════════════════════════════════
let pCat = 'all';
let openId = null;

function renderParent() {
  document.getElementById('parent-view').style.display = 'block';
  document.getElementById('admin-view').style.display = 'none';

  // Now playing
  const candidates = students
    .filter(s => s.r2Order != null && s.r2Score == null)
    .sort((a,b) => a.r2Order - b.r2Order);
  const r3candidates = students
    .filter(s => s.r3Order != null && s.r3Score == null && s.qualifiedR3)
    .sort((a,b) => a.r3Order - b.r3Order);
  const cur = candidates[0] || r3candidates[0];
  const nxt = candidates[1] || r3candidates[1];

  document.getElementById('now-num').textContent = cur ? (cur.r2Order || cur.r3Order || '—') : '—';
  document.getElementById('now-name').textContent = cur ? cur.fullName : 'Дараалал тохируулаагүй';
  document.getElementById('now-cat').textContent = cur ? cur.category + (cur.pianist ? ' · ' + cur.pianist : '') : '';
  document.getElementById('next-name').textContent = nxt ? nxt.fullName + ' (' + nxt.category + ')' : '—';

  // Filter tabs
  document.querySelectorAll('.ctab').forEach(b => {
    b.classList.toggle('on', b.dataset.cat === pCat);
  });

  // Cards
  const q = (document.getElementById('psearch')?.value || '').toLowerCase();
  const showCats = pCat === 'all' ? CATS : [pCat];
  const allRanks = {};
  CATS.forEach(c => { allRanks[c] = catRanks(c); });

  let html = '';
  showCats.forEach(cat => {
    let list = students.filter(s => s.category === cat);
    if (q) list = list.filter(s => s.fullName.toLowerCase().includes(q) || s.shortName.toLowerCase().includes(q));
    if (!list.length) return;
    list.sort((a,b) => (a.r2Order||9999) - (b.r2Order||9999));

    let catHtml = '';
    list.forEach(s => {
      const ft = finalTotal(s);
      const rank = allRanks[cat][s.id];
      const isOpen = openId === s.id;
      const cardCls = 'scard' + (s.isAnura ? ' anura' : '') + (s.qualifiedR3 ? ' q3' : '');

      let scoreHtml = '';
      if (ft != null) scoreHtml = `<div class="slb">Нийлбэр</div><div class="sbig">${ft.toFixed(2)}</div>`;
      else if (s.r2Score != null) scoreHtml = `<div class="slb">R2</div><div class="sbig">${s.r2Score.toFixed(1)}</div>`;

      let detail = '';
      if (isOpen) {
        detail = `<div class="sdet">
          <div class="dsec"><div class="dlb">R2 Бүтээл</div>
            <div class="prow"><span class="pt2">Ардын</span><span>${s.r2Trad||'—'}</span></div>
            <div class="prow"><span class="pt2">Сонгодог</span><span style="font-style:italic">${s.r2Class||'—'}</span></div>
          </div>
          ${s.qualifiedR3 ? `<div class="dsec"><div class="dlb">R3 Бүтээл</div>
            <div class="prow"><span class="pt2">Ардын</span><span>${s.r3Trad||'—'}</span></div>
            <div class="prow"><span class="pt2">Сонгодог</span><span style="font-style:italic">${s.r3Class||'—'}</span></div>
          </div>` : ''}
          <div class="dsec"><div class="dlb">Оноо</div>
            <div class="srow">
              <div class="sbox"><div class="slb2">R1</div><div class="sv">${s.r1.toFixed(1)}</div></div>
              <div class="sbox"><div class="slb2">R2</div><div class="sv ${s.r2Score==null?'empty':''}">${s.r2Score!=null?s.r2Score.toFixed(1):'—'}</div></div>
              <div class="sbox"><div class="slb2">R3</div><div class="sv ${s.r3Score==null?'empty':''}">${s.r3Score!=null?s.r3Score.toFixed(1):'—'}</div></div>
            </div>
            ${ft!=null ? `<div class="ftrow">Нийлбэр: <strong>${ft.toFixed(2)}</strong>${rank?` · <span style="color:var(--gold)">№${rank} байр</span>`:''}` : ''}
          </div>
          ${s.qualifiedR3 ? '<div class="q3b">✓ Round 3-т шалгарсан</div>' : ''}
          ${s.pianist ? `<div style="font-size:12px;color:var(--gray);margin-top:6px">Пианист: <strong style="color:var(--navy)">${s.pianist}</strong></div>` : ''}
        </div>`;
      }

      catHtml += `<div class="${cardCls}" onclick="toggleCard(${s.id})">
        <div class="stop">
          <div class="snum ${s.r2Order?'set':''}">${s.r2Order||'?'}</div>
          <div class="smain">
            <div class="sname">${s.fullName}</div>
            <div class="smeta">${cat}${s.pianist?' · '+s.pianist:''}</div>
          </div>
          <div class="sright">
            ${rank ? rkB(rank) : ''}
            ${scoreHtml ? `<div style="text-align:right;margin-top:3px">${scoreHtml}</div>` : ''}
          </div>
        </div>
        ${detail}
      </div>`;
    });

    html += pCat === 'all'
      ? `<div><div class="catheading">${cat}</div>${catHtml}</div>`
      : catHtml;
  });

  document.getElementById('pcards').innerHTML = html || '<div class="empty">Тохирох сурагч олдсонгүй</div>';
}

window.toggleCard = function(id) {
  openId = openId === id ? null : id;
  renderParent();
};
window.setPCat = function(cat, btn) {
  pCat = cat;
  renderParent();
};

// ══════════════════════════════════════════
let aCat = 'all';
let aTab = 'r2';

function renderAdmin() {
  document.getElementById('parent-view').style.display = 'none';
  document.getElementById('admin-view').style.display = 'block';

  // Stats
  const qr3 = students.filter(s => s.qualifiedR3).length;
  const missing = students.filter(s => !s.r2Trad || !s.r2Class).length;
  document.getElementById('a-stat-total').textContent = students.filter(s=>s.isAnura).length;
  document.getElementById('a-stat-q3').textContent = qr3;
  document.getElementById('a-stat-missing').textContent = missing;

  if (aTab === 'r2') renderAdminR2();
  else if (aTab === 'r3') renderAdminR3();
  else if (aTab === 'rep') renderAdminRep();
  else if (aTab === 'pianist') renderAdminPianist();

  // Tab highlight
  document.querySelectorAll('.atab').forEach(b => b.classList.toggle('on', b.dataset.tab === aTab));
  // Cat filter highlight
  document.querySelectorAll('.acf').forEach(b => b.classList.toggle('on', b.dataset.cat === aCat));
}

function renderAdminR2() {
  const showCats = aCat === 'all' ? CATS : [aCat];
  let html = '';
  showCats.forEach(cat => {
    const list = students.filter(s => s.category === cat)
      .sort((a,b) => (a.r2Order||9999)-(b.r2Order||9999));
    const rows = list.map(s => `<tr class="${rowCls(s)}">
      <td><input class="oi" type="number" min="1" value="${s.r2Order||''}" placeholder="—"
        onchange="upd(${s.id},'r2Order',this.value?parseInt(this.value):null)"></td>
      <td class="fn">${s.shortName}</td>
      <td class="piece">${s.r2Trad||'<span class="ms">—</span>'}</td>
      <td class="piece i">${s.r2Class||'<span class="ms">—</span>'}</td>
      <td>${s.r1.toFixed(1)}</td>
      <td><input class="sci" type="number" step="0.1" value="${s.r2Score!=null?s.r2Score:''}" placeholder="—"
        onchange="upd(${s.id},'r2Score',this.value!==''?parseFloat(this.value):null)"></td>
      <td><input type="checkbox" class="cq" ${s.qualifiedR3?'checked':''}
        onchange="upd(${s.id},'qualifiedR3',this.checked)"></td>
    </tr>`).join('');
    html += `<div class="atable-wrap">
      <div class="ath">${cat}</div>
      <div class="tw"><table>
        <thead><tr><th>Дараалал</th><th>Нэр</th><th>Ардын бүтээл</th><th>Сонгодог бүтээл</th><th>R1</th><th>R2 Оноо</th><th>R3?</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div></div>`;
  });
  document.getElementById('admin-content').innerHTML = html;
}

function renderAdminR3() {
  const showAll = document.getElementById('r3showall')?.checked;
  const showCats = aCat === 'all' ? CATS : [aCat];
  let html = `<div class="tgw"><label class="tg"><input type="checkbox" id="r3showall" ${showAll?'checked':''} onchange="renderAdmin()"><span class="st"></span></label> Бүгдийг харуулах</div>`;
  showCats.forEach(cat => {
    const list = students.filter(s => s.category === cat && (showAll || s.qualifiedR3))
      .sort((a,b) => (a.r3Order||9999)-(b.r3Order||9999));
    if (!list.length) return;
    const rks = catRanks(cat);
    const rows = list.map(s => {
      const ft = finalTotal(s);
      return `<tr class="${rowCls(s)}">
        <td><input class="oi" type="number" min="1" value="${s.r3Order||''}" placeholder="—"
          onchange="upd(${s.id},'r3Order',this.value?parseInt(this.value):null)"></td>
        <td class="fn">${s.shortName}</td>
        <td>${s.r2Score!=null?s.r2Score.toFixed(1):'—'}</td>
        <td class="piece">${s.r3Trad||'<span class="ms">—</span>'}</td>
        <td class="piece i">${s.r3Class||'<span class="ms">—</span>'}</td>
        <td><input class="sci" type="number" step="0.1" value="${s.r3Score!=null?s.r3Score:''}" placeholder="—"
          onchange="upd(${s.id},'r3Score',this.value!==''?parseFloat(this.value):null)"></td>
        <td class="bold">${ft!=null?ft.toFixed(2):'—'}</td>
        <td>${ft!=null?rkB(rks[s.id]):'—'}</td>
      </tr>`;
    }).join('');
    html += `<div class="atable-wrap">
      <div class="ath">${cat}</div>
      <div class="tw"><table>
        <thead><tr><th>Дараалал</th><th>Нэр</th><th>R2</th><th>R3 Ардын</th><th>R3 Сонгодог</th><th>R3 Оноо</th><th>Нийлбэр</th><th>Байр</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div></div>`;
  });
  document.getElementById('admin-content').innerHTML = html || '<div class="empty">R3-т шалгарсан сурагч байхгүй</div>';
}

function renderAdminRep() {
  const showCats = aCat === 'all' ? CATS : [aCat];
  let html = '';
  showCats.forEach(cat => {
    const list = students.filter(s => s.category === cat);
    const rows = list.map(s => `<tr class="${rowCls(s)}">
      <td class="fn">${s.shortName}</td>
      <td>${s.pianist||'—'}</td>
      <td><input class="pi" value="${s.r2Trad||''}" onchange="upd(${s.id},'r2Trad',this.value)"></td>
      <td><input class="pi" value="${s.r2Class||''}" onchange="upd(${s.id},'r2Class',this.value)"></td>
      <td><input class="pi" value="${s.r3Trad||''}" onchange="upd(${s.id},'r3Trad',this.value)"></td>
      <td><input class="pi" value="${s.r3Class||''}" onchange="upd(${s.id},'r3Class',this.value)"></td>
      <td><input class="pi" style="width:80px" value="${s.notes||''}" onchange="upd(${s.id},'notes',this.value)"></td>
    </tr>`).join('');
    html += `<div class="atable-wrap">
      <div class="ath">${cat}</div>
      <div class="tw"><table>
        <thead><tr><th>Нэр</th><th>Пианист</th><th>R2 Ардын</th><th>R2 Сонгодог</th><th>R3 Ардын</th><th>R3 Сонгодог</th><th>Тэмдэглэл</th></tr></thead>
        <tbody>${rows}</tbody>
      </table></div></div>`;
  });
  document.getElementById('admin-content').innerHTML = html;
}

function renderAdminPianist() {
  let html = '';
  ['Suzy','Mona'].forEach(pianist => {
    html += `<div class="atable-wrap"><div class="ath">${pianist}</div>`;
    CATS.forEach(cat => {
      const list = students.filter(s => s.pianist === pianist && s.category === cat)
        .sort((a,b) => (a.r2Order||9999)-(b.r2Order||9999));
      if (!list.length) return;
      const rows = list.map(s => `<tr class="${rowCls(s)}">
        <td class="bold">${s.r2Order||'—'}</td>
        <td class="fn">${s.shortName}</td>
        <td class="piece">${s.r2Trad||'—'}</td>
        <td class="piece i">${s.r2Class||'—'}</td>
        <td class="bold">${s.r3Order||'—'}</td>
        <td class="piece">${s.r3Trad||'—'}</td>
        <td class="piece i">${s.r3Class||'—'}</td>
        <td>${s.qualifiedR3?'<span class="bg">✓</span>':'—'}</td>
      </tr>`).join('');
      html += `<div style="margin-bottom:14px">
        <div style="font-size:12px;color:var(--gray);font-weight:600;margin:8px 0 5px;text-transform:uppercase;letter-spacing:0.05em">${cat}</div>
        <div class="tw"><table>
          <thead><tr><th>R2#</th><th>Нэр</th><th>R2 Ардын</th><th>R2 Сонгодог</th><th>R3#</th><th>R3 Ардын</th><th>R3 Сонгодог</th><th>R3?</th></tr></thead>
          <tbody>${rows}</tbody>
        </table></div></div>`;
    });
    html += '</div>';
  });
  document.getElementById('admin-content').innerHTML = html;
}

window.setATab = function(tab) {
  aTab = tab;
  renderAdmin();
};
window.setACat = function(cat) {
  aCat = cat;
  renderAdmin();
};
window.upd = upd;
window.switchView = function(v) {
  currentView = v;
  renderCurrentView();
  document.getElementById('view-btns').querySelectorAll('button').forEach(b => {
    b.classList.toggle('on', b.dataset.view === v);
  });
};
window.addExt = function() {
  const name = document.getElementById('en').value.trim();
  if (!name) return;
  students.push({
    id: nextId++,
    fullName: name,
    shortName: document.getElementById('es').value.trim() || name,
    category: document.getElementById('ec').value,
    teacher: null, pianist: null, isAnura: false,
    r1: parseFloat(document.getElementById('er').value)||0,
    r2Order:null,r2Score:null,r2Trad:'',r2Class:'',
    qualifiedR3:false,r3Order:null,r3Score:null,r3Trad:'',r3Class:'',notes:''
  });
  saveToFirebase();
  document.getElementById('addform').style.display='none';
  ['en','es','er'].forEach(id=>document.getElementById(id).value='');
};
window.toggleAdd = function() {
  const f = document.getElementById('addform');
  f.style.display = f.style.display==='none'?'block':'none';
};
</script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --ivory:#F9F6F0;--ivory2:#F2EDE3;--ivory3:#E8E0D0;
  --navy:#1A2340;--navy2:#2B3A5C;--navy3:#3D5080;
  --gold:#B8975A;--gold-light:#F5EDDA;--gold-mid:#E8D5A0;
  --green:#4A7A5A;--green-light:#E8F3EC;
  --gray:#6B6B6B;--border:#D4C9B0;--red:#C0392B;
}
body{font-family:'Jost',sans-serif;background:var(--ivory);color:var(--navy);min-height:100vh;font-size:14px}
h2,h3{font-family:'Cormorant Garamond',serif;font-weight:600}

/* NAV */
#topnav{background:var(--navy);padding:0 14px;height:50px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
.brand{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:#fff}
.brand em{color:var(--gold);font-style:italic}
#view-btns{display:flex;gap:4px}
#view-btns button{background:rgba(255,255,255,0.1);border:none;color:rgba(255,255,255,0.65);padding:5px 12px;font-family:'Jost',sans-serif;font-size:11px;font-weight:500;cursor:pointer;border-radius:4px;letter-spacing:0.04em;text-transform:uppercase;transition:all 0.15s}
#view-btns button.on{background:rgba(255,255,255,0.25);color:#fff}

/* ── PARENT VIEW ── */
#now-bar{background:var(--navy2);padding:11px 16px}
.nlb{font-size:10px;color:rgba(255,255,255,0.5);text-transform:uppercase;letter-spacing:0.1em;margin-bottom:4px}
.nrow{display:flex;align-items:center;gap:12px}
#now-num{font-family:'Cormorant Garamond',serif;font-size:32px;font-weight:600;color:var(--gold);line-height:1;min-width:38px}
.ninfo .nname{font-size:16px;font-weight:600;color:#fff;font-family:'Cormorant Garamond',serif}
.ninfo .ncat{font-size:12px;color:rgba(255,255,255,0.55);margin-top:1px}
.nextb{background:rgba(0,0,0,0.2);padding:6px 16px;font-size:12px;color:rgba(255,255,255,0.6)}
.nextb strong{color:rgba(255,255,255,0.85)}
.ld{width:7px;height:7px;border-radius:50%;background:var(--gold);animation:pulse 1.5s infinite;display:inline-block;margin-right:6px}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

#psearch-bar{padding:11px 14px;background:#fff;border-bottom:1px solid var(--border);position:sticky;top:50px;z-index:40}
.sbox{display:flex;align-items:center;background:var(--ivory);border:1px solid var(--border);border-radius:8px;padding:7px 13px;gap:7px}
.sbox input{background:transparent;border:none;outline:none;font-family:'Jost',sans-serif;font-size:14px;color:var(--navy);flex:1}

#pcat-tabs{display:flex;overflow-x:auto;background:#fff;border-bottom:1px solid var(--border);padding:0 12px;-webkit-overflow-scrolling:touch}
#pcat-tabs::-webkit-scrollbar{display:none}
.ctab{background:transparent;border:none;border-bottom:2px solid transparent;padding:9px 13px;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;color:var(--gray);cursor:pointer;white-space:nowrap;transition:all 0.15s}
.ctab.on{color:var(--navy);border-bottom-color:var(--gold);font-weight:600}

#pcards{padding:13px 13px 30px}
.catheading{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--navy);margin:14px 0 7px}
.scard{background:#fff;border:1px solid var(--border);border-radius:10px;margin-bottom:9px;overflow:hidden;cursor:pointer}
.scard.anura{border-left:4px solid var(--gold)}
.scard.anura.q3{border-left:4px solid var(--green)}
.stop{padding:11px 13px;display:flex;align-items:center;gap:11px}
.snum{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:600;color:var(--border);line-height:1;min-width:34px;text-align:center}
.snum.set{color:var(--navy3)}
.smain{flex:1;min-width:0}
.sname{font-size:14px;font-weight:600;color:var(--navy);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.smeta{font-size:11px;color:var(--gray);margin-top:1px}
.sright{display:flex;flex-direction:column;align-items:flex-end;gap:3px;flex-shrink:0}
.sbig{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:600;color:var(--navy)}
.slb{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:0.05em}
.sdet{border-top:1px solid var(--ivory3);padding:11px 13px;background:var(--ivory)}
.dsec{margin-bottom:10px}.dsec:last-child{margin-bottom:0}
.dlb{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:0.08em;font-weight:600;margin-bottom:5px}
.prow{display:flex;gap:8px;align-items:baseline;margin-bottom:3px;font-size:13px;color:var(--navy)}
.pt2{font-size:10px;font-weight:600;color:var(--navy3);text-transform:uppercase;letter-spacing:0.04em;min-width:58px}
.srow{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:3px}
.sbox2{background:#fff;border:1px solid var(--border);border-radius:7px;padding:7px 9px;text-align:center}
.slb2{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:2px}
.sv{font-family:'Cormorant Garamond',serif;font-size:19px;font-weight:600;color:var(--navy)}
.sv.empty{color:var(--border);font-size:15px}
.ftrow{margin-top:7px;text-align:center;font-size:13px;color:var(--navy)}
.q3b{display:inline-flex;align-items:center;gap:5px;background:var(--green-light);border:1px solid var(--green);border-radius:6px;padding:4px 10px;font-size:12px;font-weight:600;color:#3a6349;margin-top:6px}
.empty{text-align:center;padding:30px;color:var(--gray);font-size:13px}

/* ── ADMIN VIEW ── */
#admin-view{padding:14px}
.astats{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;margin-bottom:14px}
.astat{background:#fff;border:1px solid var(--border);border-radius:7px;padding:10px 12px;text-align:center}
.astat .al{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:0.06em;margin-bottom:3px}
.astat .av{font-family:'Cormorant Garamond',serif;font-size:24px;font-weight:600;color:var(--navy)}
.atabs{display:flex;gap:5px;margin-bottom:10px;flex-wrap:wrap}
.atab{background:#fff;border:1px solid var(--border);border-radius:4px;padding:5px 12px;font-family:'Jost',sans-serif;font-size:11px;font-weight:500;cursor:pointer;color:var(--navy);transition:all 0.12s;text-transform:uppercase;letter-spacing:0.04em}
.atab.on{background:var(--navy);color:#fff;border-color:var(--navy)}
.acfs{display:flex;gap:5px;margin-bottom:12px;flex-wrap:wrap}
.acf{background:#fff;border:1px solid var(--border);border-radius:4px;padding:4px 10px;font-family:'Jost',sans-serif;font-size:11px;cursor:pointer;color:var(--navy);font-weight:500;transition:all 0.12s}
.acf.on{background:var(--navy2);color:#fff}

/* TABLES */
.atable-wrap{margin-bottom:18px}
.ath{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:600;color:var(--navy);margin-bottom:7px}
.tw{overflow-x:auto;border-radius:8px;border:1px solid var(--border);background:#fff}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--navy);color:#fff;padding:7px 9px;text-align:left;font-family:'Jost',sans-serif;font-size:10px;font-weight:500;letter-spacing:0.05em;text-transform:uppercase;white-space:nowrap}
td{padding:6px 9px;border-bottom:0.5px solid var(--ivory3);vertical-align:middle;color:var(--navy)}
tr:last-child td{border-bottom:none}
tr.ar{background:var(--gold-light)}
tr.ar:hover{background:var(--gold-mid)}
tr:not(.ar):hover{background:var(--ivory2)}
tr.qr{background:var(--green-light)}
tr.ar.qr{background:linear-gradient(90deg,var(--gold-light) 55%,var(--green-light))}
td.fn{font-weight:500}
td.piece{font-size:11px}
td.piece.i{font-style:italic}
td.bold{font-weight:600}
.oi{width:38px;background:#fff;border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-family:'Jost',sans-serif;font-size:12px;color:var(--navy);text-align:center;outline:none}
.oi:focus{border-color:var(--gold)}
.sci{width:54px;background:#fff;border:1px solid var(--border);border-radius:4px;padding:2px 4px;font-family:'Jost',sans-serif;font-size:12px;color:var(--navy);text-align:center;outline:none}
.sci:focus{border-color:var(--gold)}
.pi{background:transparent;border:none;border-bottom:1px dashed var(--border);font-family:'Jost',sans-serif;font-size:11px;color:var(--navy);outline:none;padding:1px 2px;width:140px}
.pi:focus{border-bottom-color:var(--gold)}
.cq{width:15px;height:15px;cursor:pointer;accent-color:var(--green)}
.ms{color:#bbb;font-style:italic}
.rk{display:inline-flex;align-items:center;justify-content:center;width:22px;height:22px;border-radius:50%;font-size:11px;font-weight:600;font-family:'Cormorant Garamond',serif}
.rk1{background:var(--gold);color:#fff}.rk2{background:#B0B0B0;color:#fff}.rk3{background:#CD7F32;color:#fff}.rkn{background:var(--ivory3);color:var(--gray)}
.bg{display:inline-block;padding:2px 7px;border-radius:3px;font-size:10px;font-weight:600;background:var(--green);color:#fff}

/* ADD FORM */
.af{background:#fff;border:1px solid var(--border);border-radius:8px;padding:14px;margin-bottom:14px}
.afrow{display:grid;grid-template-columns:repeat(auto-fit,minmax(130px,1fr));gap:8px;margin-bottom:10px}
.afg{display:flex;flex-direction:column;gap:3px}
.afg label{font-size:10px;color:var(--gray);text-transform:uppercase;letter-spacing:0.05em;font-weight:500}
.afg input,.afg select{background:#fff;border:1px solid var(--border);border-radius:4px;padding:5px 8px;font-family:'Jost',sans-serif;font-size:12px;color:var(--navy);outline:none}
.btn{background:var(--navy);color:#fff;border:none;border-radius:4px;padding:6px 13px;font-family:'Jost',sans-serif;font-size:12px;font-weight:500;cursor:pointer}
.btn-gold{background:var(--gold)}.btn-g{background:transparent;border:1px solid var(--border);color:var(--navy)}

/* TOGGLE */
.tgw{display:flex;align-items:center;gap:7px;font-size:12px;color:var(--gray);margin-bottom:11px}
.tg{position:relative;width:30px;height:17px}
.tg input{opacity:0;width:0;height:0}
.st{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--border);border-radius:17px;transition:.2s}
.st:before{position:absolute;content:"";height:11px;width:11px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:.2s}
.tg input:checked+.st{background:var(--green)}
.tg input:checked+.st:before{transform:translateX(13px)}

@media(max-width:500px){
  .astats{grid-template-columns:repeat(3,1fr)}
  .atabs{gap:4px}
}
</style>
</head>
<body>

<div id="topnav">
  <div class="brand">Anura <em>·</em> MKF 2026</div>

  <div style="margin-bottom:12px;display:flex;gap:7px">

      <div class="afg"><label>Бүтэн нэр</label><input id="en" placeholder="Нэр"></div>
      <div class="afg"><label>Богино нэр</label><input id="es" placeholder="Богино"></div>
      <div class="afg"><label>Ангилал</label><select id="ec"><option>Children A</option><option>Children B</option><option>Youth A</option><option>Youth B</option></select></div>
